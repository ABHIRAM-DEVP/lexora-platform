services:

  app:
    build: .
    container_name: lexora-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      MONGO_URI: mongodb://mongo:27017/lexora
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    restart: always
    networks:
      - lexora-network

  postgres:
    image: postgres:16
    container_name: lexora-postgres
    environment:
      url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - lexora-network

  mongo:
    image: mongo:7
    container_name: lexora-mongo
    ports:
      - "27017:27017"
    restart: always
    networks:
      - lexora-network

  redis:
    image: redis:7
    container_name: lexora-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - lexora-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lexora-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    restart: always
    networks:
      - lexora-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lexora-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always
    networks:
      - lexora-network

networks:
  lexora-network:
    driver: bridge
