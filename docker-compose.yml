version: '3.9'

services:
  app:
    build: .
    container_name: lexora-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/lexora

      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
    depends_on:
      - postgres
      - mongo
      - redis
      - kafka
      - elasticsearch
    restart: always
    networks:
      - lexora-network

  postgres:
    image: postgres:16
    container_name: lexora-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - lexora-network

  mongo:
    image: mongo:7
    container_name: lexora-mongo
    ports:
      - "27017:27017"
    restart: always
    networks:
      - lexora-network

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: lexora-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - lexora-network

  redis:
    image: redis:7
    container_name: lexora-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - lexora-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lexora-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    restart: always
    networks:
      - lexora-network
    # Disable healthcheck for now to avoid dependency issues
    # healthcheck:
    #   test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lexora-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always
    networks:
      - lexora-network

networks:
  lexora-network:
    driver: bridge