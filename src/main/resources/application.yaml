spring:

  cache:
      type: redis
      
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false


  data:
    mongodb:
      uri: ${MONGO_URI}
      database: ${MONGO_INITDB_DATABASE}

    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      time-to-live: 600000
      


  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  
  jackson:
    serialization:
      write-dates-as-timestamps: false

  


jwt:  
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS}

storage:
  localPath: C:/lexora/uploads

logging:
  level:
    "[org.springframework.data.mongodb.core.MongoTemplate]": DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    enable:
      all: true

---
spring:
  config:
    activate:
      on-profile: test

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoHealthContributorAutoConfiguration
      
  data:
    mongodb:
      database: ${MONGO_TEST_DATABASE}
      uri: ${MONGO_TEST_URI}

jwt:  
  secret: test-jwt-secret
  expiration-ms: 3600000

    

